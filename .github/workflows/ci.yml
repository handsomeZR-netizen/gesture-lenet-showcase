name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python + JS tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch, smaller download
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          python -m pip install numpy pytest fastapi 'uvicorn[standard]' pydantic onnx onnxruntime

      - name: Run pytest
        run: pytest tests/ -v

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate JS fixture
        run: |
          python - <<'PY'
          import json, numpy as np
          from gesture_mlp.features import landmarks_to_feature
          rng = np.random.default_rng(7)
          landmarks = (rng.random((21, 3)) * 0.5 + 0.25).astype(np.float32)
          fixture = {
              "landmarks": landmarks.tolist(),
              "feature_right": landmarks_to_feature(landmarks, "Right").tolist(),
              "feature_left": landmarks_to_feature(landmarks, "Left").tolist(),
          }
          import os
          os.makedirs("web_control_demo/modules", exist_ok=True)
          with open("web_control_demo/modules/features.fixture.json", "w") as f:
              json.dump(fixture, f)
          PY

      - name: JS cross-language test
        run: node tests/test_features_js.mjs
