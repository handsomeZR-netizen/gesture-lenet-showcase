<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手势控制 · 控制中枢</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="single-page">
    <div class="app-shell">
      <header class="app-header">
        <div class="header-brand">
          <span class="brand-mark"></span>
          <div>
            <p class="brand-eyebrow">Gesture Control · 课程项目优化版</p>
            <h1 class="brand-title">手势控制中枢</h1>
          </div>
        </div>
        <div class="header-status">
          <span id="cameraState" class="status-pill status-idle">摄像头未启动</span>
          <span id="controlState" class="status-pill status-idle">未连接</span>
          <span id="wsState" class="status-pill status-idle">后端离线</span>
        </div>
        <div class="header-actions">
          <label class="model-picker" title="切换识别模型">
            <span class="model-picker-label">模型</span>
            <select id="modelSelect" class="model-select"></select>
          </label>
          <button id="startButton" class="primary-button" type="button">启动摄像头</button>
          <button id="unlockButton" class="ghost-button" type="button">解锁</button>
          <button id="pauseButton" class="ghost-button" type="button">暂停</button>
          <label class="test-toggle">
            <input id="testMode" type="checkbox" />
            <span>测试模式</span>
          </label>
        </div>
      </header>

      <p id="warningStrip" class="warning-strip" hidden></p>

      <main class="app-main">
        <section class="live-panel">
          <div class="camera-stage">
            <video id="cameraFeed" playsinline muted></video>
            <canvas id="overlayCanvas"></canvas>
            <div id="cameraOverlay" class="camera-overlay">
              <p class="overlay-title">摄像头未启动</p>
              <p class="overlay-body">点上方「启动摄像头」并允许浏览器访问。</p>
              <button id="overlayRetry" class="ghost-button overlay-retry" type="button" hidden>重试</button>
            </div>
            <div id="actionBubble" class="action-bubble" aria-live="polite"></div>

            <div class="camera-hud">
              <div class="hud-gesture">
                <p class="hud-kicker">当前手势</p>
                <p id="gestureLabel" class="hud-gesture-value">等待手势</p>
                <div class="confidence-track">
                  <div id="confidenceBar" class="confidence-fill"></div>
                </div>
                <p id="confidenceValue" class="hud-sub">0%</p>
              </div>
              <div class="hud-stats">
                <div><span class="hud-kicker">FPS</span><span id="fpsValue">0.0</span></div>
                <div><span class="hud-kicker">延迟</span><span id="latencyValue">0 ms</span></div>
                <div><span class="hud-kicker">手部</span><span id="handsValue">0</span></div>
                <div><span class="hud-kicker">触发</span><span id="triggerCountValue">0</span></div>
                <div><span class="hud-kicker">屏幕</span><span id="screenSizeValue">— × —</span></div>
                <div><span class="hud-kicker">指针</span><span id="cursorValue">(—, —)</span></div>
                <div><span class="hud-kicker">运行</span><span id="uptimeValue">0.0 s</span></div>
                <div><span class="hud-kicker">最近</span><span id="lastActionValue" class="hud-truncate">—</span></div>
              </div>
            </div>
          </div>
        </section>

        <aside class="bindings-pane">
          <div class="bindings-head">
            <div>
              <p class="panel-kicker">手势绑定</p>
              <h2>手势 → 计算机动作</h2>
            </div>
            <a class="record-pill" href="./record.html" title="录制自己的手势数据集">录制</a>
          </div>
          <div id="bindingsList" class="bindings-list"></div>
          <p class="bindings-foot">
            按 <kbd>Esc</kbd> 物理键 · 或鼠标拖到屏幕角 · 立即停止注入。配置存于
            <code>~/.config/gesture_control/bindings.json</code>。
          </p>
        </aside>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
